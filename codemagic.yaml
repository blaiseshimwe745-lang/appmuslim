workflows:
  react-native-ios:
    name: Barakah iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 18
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.barakah.digitaldetox"

    integrations:
      app_store_connect: Codemagic

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Expo prebuild
        script: |
          npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        script: |
          cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build iOS app
        script: |
          cd ios
          xcodebuild -workspace Barakah.xcworkspace \
            -scheme Barakah \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/build/Barakah.xcarchive \
            archive | xcpretty

      - name: Export IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/Barakah.xcworkspace \
            --scheme Barakah \
            --archive-path $CM_BUILD_DIR/build/Barakah.xcarchive

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
